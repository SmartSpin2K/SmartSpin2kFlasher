name: Build

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Get latest tag and increment
        id: tag
        run: |
          git fetch --tags
          latest_tag=$(git tag -l | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1)
          if [ -z "$latest_tag" ]; then
            new_tag="v0.0.1"
          else
            if [[ $latest_tag =~ v([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
              major="${BASH_REMATCH[1]}"
              minor="${BASH_REMATCH[2]}"
              patch="${BASH_REMATCH[3]}"
              patch=$((patch + 1))
              if [ $patch -gt 9 ]; then
                patch=0
                minor=$((minor + 1))
                if [ $minor -gt 9 ]; then
                  minor=0
                  major=$((major + 1))
                fi
              fi
              if [ $major -gt 99 ]; then
                echo "Error: Version exceeded v99.9.9"
                exit 1
              fi
              new_tag="v${major}.${minor}.${patch}"
            else
              echo "Error: Invalid tag format found"
              exit 1
            fi
          fi
          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT
          
      - name: Create and push new tag
        run: |
          git tag ${{ steps.tag.outputs.new_tag }}
          git push origin ${{ steps.tag.outputs.new_tag }}

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact-name: SmartSpin2kFlasher-windows
            build-cmd: flutter build windows --release
            artifact-path: build/windows/x64/runner/Release/
          - os: macos-latest
            artifact-name: SmartSpin2kFlasher-macos
            build-cmd: flutter build macos --release
            artifact-path: build/macos/Build/Products/Release/
          - os: ubuntu-latest
            artifact-name: SmartSpin2kFlasher-linux
            build-cmd: flutter build linux --release
            artifact-path: build/linux/x64/release/bundle/

    steps:
    - uses: actions/checkout@v6

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable

    - name: Install Linux dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

    - name: Install dependencies
      run: flutter pub get

    - name: Download esptool
      run: dart run tool/download_esptool.dart

    - name: Analyze
      run: flutter analyze

    - name: Build
      run: ${{ matrix.build-cmd }}

    - name: Package Windows Installer
      if: matrix.os == 'windows-latest'
      run: |
        $env:APP_VERSION = (Select-String -Path pubspec.yaml -Pattern '^version:\s*(\S+)' | ForEach-Object { $_.Matches[0].Groups[1].Value })
        iscc /DAPP_VERSION="$env:APP_VERSION" windows\installer.iss
        Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "SmartSpin2kFlasher-windows.zip"

    - name: Package macOS DMG
      if: matrix.os == 'macos-latest'
      run: |
        brew install create-dmg
        cp -r assets/esptool build/macos/Build/Products/Release/smartspin2k_flasher.app/Contents/Resources/esptool
        create-dmg \
          --volname "SmartSpin2k Flasher" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 100 \
          --icon "smartspin2k_flasher.app" 150 185 \
          --app-drop-link 450 185 \
          --no-internet-enable \
          "SmartSpin2kFlasher-macos.dmg" \
          "build/macos/Build/Products/Release/smartspin2k_flasher.app"

    - name: Package Linux
      if: matrix.os == 'ubuntu-latest'
      run: |
        cd build/linux/x64/release/bundle/
        tar czf ${{ github.workspace }}/SmartSpin2kFlasher-linux.tar.gz *

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact-name }}
        path: SmartSpin2kFlasher-*.*

  release:
    needs: [build, tag-and-release]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
    - uses: actions/checkout@v6
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/**/*
        draft: false
        prerelease: false
        generate_release_notes: true
        tag_name: ${{ needs.tag-and-release.outputs.new_tag }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
